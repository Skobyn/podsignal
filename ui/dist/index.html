<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodSignal — Podcast Guest Intelligence</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8eaed; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { background: #1a1d27; border-bottom: 1px solid #2d3142; padding: 12px 20px; display: flex; align-items: center; gap: 16px; z-index: 1000; }
    .logo { font-size: 20px; font-weight: 700; color: #7c6af7; letter-spacing: -0.5px; }
    .logo span { color: #e8eaed; }
    .search-bar { display: flex; gap: 8px; flex: 1; max-width: 600px; }
    .search-bar input { flex: 1; background: #252836; border: 1px solid #3d4157; border-radius: 8px; padding: 8px 14px; color: #e8eaed; font-size: 14px; outline: none; }
    .search-bar input:focus { border-color: #7c6af7; }
    .search-bar input::placeholder { color: #666; }
    .btn { background: #7c6af7; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; white-space: nowrap; }
    .btn:hover { background: #6a5ae0; }
    .btn:disabled { background: #444; cursor: not-allowed; }
    .btn-secondary { background: #252836; border: 1px solid #3d4157; }
    .btn-secondary:hover { background: #2d3142; }

    /* Main layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Map */
    #map { flex: 1; z-index: 1; }

    /* Side panel */
    .panel { width: 380px; background: #1a1d27; border-left: 1px solid #2d3142; display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s; }
    .panel.collapsed { width: 0; border: none; }
    .panel-header { padding: 16px; border-bottom: 1px solid #2d3142; display: flex; justify-content: space-between; align-items: center; }
    .panel-header h3 { font-size: 14px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .panel-content { flex: 1; overflow-y: auto; padding: 16px; }

    /* Guest list */
    .guest-list { display: flex; flex-direction: column; gap: 10px; }
    .guest-card { background: #252836; border: 1px solid #2d3142; border-radius: 10px; padding: 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .guest-card:hover { border-color: #7c6af7; background: #2a2d40; }
    .guest-card.active { border-color: #7c6af7; background: #2a2d40; }
    .guest-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .guest-meta { font-size: 12px; color: #888; margin-bottom: 6px; }
    .guest-score { display: inline-block; background: #7c6af7; color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
    .guest-score.high { background: #22c55e; }
    .guest-score.med { background: #f59e0b; }
    .topics { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .topic-tag { background: #1a1d27; border: 1px solid #2d3142; font-size: 11px; padding: 2px 8px; border-radius: 12px; color: #aaa; }

    /* Guest detail */
    .guest-detail { display: flex; flex-direction: column; gap: 16px; }
    .detail-section { background: #252836; border: 1px solid #2d3142; border-radius: 10px; padding: 14px; }
    .detail-section h4 { font-size: 11px; font-weight: 600; color: #7c6af7; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .detail-section p { font-size: 13px; line-height: 1.6; color: #ccc; }
    .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: #7c6af7; cursor: pointer; font-size: 13px; padding: 0; margin-bottom: 12px; }
    .back-btn:hover { color: #9f93f7; }
    .linkedin-btn { display: inline-flex; align-items: center; gap: 6px; background: #0a66c2; color: white; border-radius: 6px; padding: 6px 12px; font-size: 12px; text-decoration: none; font-weight: 600; margin-top: 8px; }
    .outreach-box { background: #1a1d27; border: 1px solid #3d4157; border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.7; color: #bbb; white-space: pre-wrap; font-family: inherit; }
    .copy-btn { background: #252836; border: 1px solid #3d4157; color: #aaa; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; margin-top: 8px; }
    .copy-btn:hover { background: #2d3142; color: white; }

    /* Status bar */
    .status-bar { background: #252836; border-top: 1px solid #2d3142; padding: 6px 16px; font-size: 12px; color: #666; display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; }
    .status-dot.running { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.done { background: #22c55e; }
    .status-dot.error { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Popup */
    .leaflet-popup-content-wrapper { background: #1a1d27; border: 1px solid #3d4157; border-radius: 10px; color: #e8eaed; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .leaflet-popup-tip { background: #1a1d27; }
    .leaflet-popup-content { margin: 12px 14px; }
    .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .popup-company { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .popup-view { color: #7c6af7; font-size: 12px; cursor: pointer; background: none; border: none; padding: 0; font-weight: 600; }
    .popup-view:hover { text-decoration: underline; }

    /* Splash */
    .splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #555; text-align: center; gap: 8px; }
    .splash h4 { font-size: 16px; color: #666; font-weight: 500; }
    .splash p { font-size: 13px; }

    /* Progress */
    .progress-bar { background: #252836; border-radius: 4px; height: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { background: #7c6af7; height: 100%; transition: width 0.5s; border-radius: 4px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Pod<span>Signal</span></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search a niche... e.g. restaurant AI, fitness coaching, SaaS marketing" />
    <button class="btn" id="searchBtn" onclick="startSearch()">Search</button>
  </div>
  <button class="btn btn-secondary" onclick="togglePanel()">☰ List</button>
</div>

<div class="main">
  <div id="map"></div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <h3 id="panelTitle">Results</h3>
      <span id="resultCount" style="font-size:13px;color:#666"></span>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="splash">
        <h4>Search a niche to get started</h4>
        <p>We'll find podcast guests in your space and map where they are.</p>
      </div>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Ready</span>
  <div id="progressBar" style="display:none; flex:1; max-width:200px">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [30, -10], zoom: 2 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  maxZoom: 19
}).addTo(map);

const markerIcon = (score) => {
  const color = score >= 8 ? '#22c55e' : score >= 6 ? '#7c6af7' : '#f59e0b';
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
};

// ─── State ────────────────────────────────────────────────────────────────────
let allGuests = [];
let markers = [];
let currentJob = null;
let pollInterval = null;
let panelOpen = true;

// ─── API base ─────────────────────────────────────────────────────────────────
const API = window.location.origin;

// ─── Search ───────────────────────────────────────────────────────────────────
async function startSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) return;

  document.getElementById('searchBtn').disabled = true;
  setStatus('running', `Searching for "${keyword}"...`);
  document.getElementById('progressBar').style.display = 'flex';
  clearMarkers();
  allGuests = [];

  try {
    const resp = await fetch(`${API}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword, days_back: 30, min_score: 5 })
    });
    const data = await resp.json();
    currentJob = data.job_id;
    pollJob(data.job_id);
  } catch (e) {
    setStatus('error', 'Search failed — is the API running?');
    document.getElementById('searchBtn').disabled = false;
  }
}

function pollJob(jobId) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const resp = await fetch(`${API}/api/jobs/${jobId}`);
      const job = await resp.json();

      const pct = job.progress || 0;
      document.getElementById('progressFill').style.width = pct + '%';
      setStatus('running', job.status_message || `Processing... ${pct}%`);

      if (job.status === 'done') {
        clearInterval(pollInterval);
        document.getElementById('progressBar').style.display = 'none';
        document.getElementById('searchBtn').disabled = false;
        allGuests = job.guests || [];
        renderResults(allGuests, job.keyword);
      } else if (job.status === 'error') {
        clearInterval(pollInterval);
        setStatus('error', job.error || 'Job failed');
        document.getElementById('searchBtn').disabled = false;
        document.getElementById('progressBar').style.display = 'none';
      }
    } catch (e) {
      console.error('Poll error:', e);
    }
  }, 2000);
}

// ─── Results ──────────────────────────────────────────────────────────────────
function renderResults(guests, keyword) {
  const mapped = guests.filter(g => g.lat && g.lng);
  const unmapped = guests.filter(g => !g.lat || !g.lng);

  setStatus('done', `Found ${guests.length} guests (${mapped.length} mapped)`);
  document.getElementById('resultCount').textContent = `${guests.length} guests`;

  clearMarkers();
  mapped.forEach(g => addMarker(g));

  if (mapped.length > 0) {
    const bounds = L.latLngBounds(mapped.map(g => [g.lat, g.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }

  showGuestList(guests);
}

function addMarker(guest) {
  const score = guest.score || (guest.synthesis?.prospect_score) || 5;
  const m = L.marker([guest.lat, guest.lng], { icon: markerIcon(score) }).addTo(map);
  m.bindPopup(`
    <div class="popup-name">${guest.guest_name || 'Unknown'}</div>
    <div class="popup-company">${guest.guest_company || ''} ${guest.guest_title ? '· ' + guest.guest_title : ''}</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px">📍 ${guest.location_name || ''}</div>
    <button class="popup-view" onclick="showGuestDetail(${JSON.stringify(guest.guest_name).replace(/'/g,"\\'")})" >View Full Profile →</button>
  `);
  markers.push(m);
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// ─── Guest list ───────────────────────────────────────────────────────────────
function showGuestList(guests) {
  document.getElementById('panelTitle').textContent = 'Results';
  const html = guests.length === 0
    ? '<div class="splash"><h4>No guests found</h4><p>Try different keywords or add RSS feeds</p></div>'
    : `<div class="guest-list">${guests.map(g => guestCard(g)).join('')}</div>`;
  document.getElementById('panelContent').innerHTML = html;

  if (!panelOpen) togglePanel();
}

function guestCard(g) {
  const score = g.score || g.synthesis?.prospect_score || 5;
  const scoreClass = score >= 8 ? 'high' : score >= 6 ? '' : 'med';
  const topics = (g.key_topics || []).slice(0, 2);
  return `
    <div class="guest-card" onclick="showGuestDetail('${escapeHtml(g.guest_name)}')">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <div class="guest-name">${g.guest_name || 'Unknown'}</div>
          <div class="guest-meta">${g.guest_company || ''} ${g.guest_title ? '· ' + g.guest_title : ''}</div>
        </div>
        <span class="guest-score ${scoreClass}">${score}/10</span>
      </div>
      <div style="font-size:11px;color:#666;margin-bottom:6px">🎙 ${g.podcast_name || ''}</div>
      ${g.lat ? `<div style="font-size:11px;color:#888">📍 ${g.location_name || ''}</div>` : ''}
      <div class="topics">${topics.map(t => `<span class="topic-tag">${t.substring(0,40)}</span>`).join('')}</div>
    </div>`;
}

function showGuestDetail(name) {
  const g = allGuests.find(g => g.guest_name === name);
  if (!g) return;

  const score = g.score || g.synthesis?.prospect_score || 5;
  const scoreClass = score >= 8 ? 'high' : score >= 6 ? '' : 'med';
  const synth = g.synthesis || {};

  document.getElementById('panelTitle').textContent = 'Guest Profile';
  document.getElementById('panelContent').innerHTML = `
    <div class="guest-detail">
      <button class="back-btn" onclick="showGuestList(allGuests)">← Back to results</button>
      
      <div class="detail-section">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <div>
            <div class="guest-name" style="font-size:18px">${g.guest_name || 'Unknown'}</div>
            <div class="guest-meta" style="font-size:13px;margin-top:4px">${g.guest_title || ''} ${g.guest_company ? '@ ' + g.guest_company : ''}</div>
          </div>
          <span class="guest-score ${scoreClass}" style="font-size:14px;padding:4px 12px">${score}/10</span>
        </div>
        <p>${g.guest_background || ''}</p>
        ${g.guest_stage ? `<div style="font-size:11px;color:#666;margin-top:8px">Stage: ${g.guest_stage}</div>` : ''}
        ${g.linkedin_url ? `<a class="linkedin-btn" href="${g.linkedin_url}" target="_blank">LinkedIn →</a>` : ''}
      </div>

      <div class="detail-section">
        <h4>🎙 Episode</h4>
        <div style="font-size:13px;color:#888;margin-bottom:6px">${g.podcast_name || ''}</div>
        <p style="font-weight:500">${g.episode_title || ''}</p>
        ${g.episode_url ? `<a href="${g.episode_url}" target="_blank" style="font-size:12px;color:#7c6af7;display:block;margin-top:8px">Listen →</a>` : ''}
      </div>

      ${g.key_topics?.length ? `
      <div class="detail-section">
        <h4>💡 Key Topics</h4>
        <div class="topics" style="gap:6px">
          ${g.key_topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}
        </div>
        ${g.key_insight ? `<p style="margin-top:10px;font-style:italic;color:#aaa">"${g.key_insight}"</p>` : ''}
      </div>` : ''}

      ${g.lat ? `
      <div class="detail-section">
        <h4>📍 Location</h4>
        <p>${g.location_name || 'Unknown'}</p>
      </div>` : ''}

      ${synth.outreach_email ? `
      <div class="detail-section">
        <h4>✉️ Suggested Outreach</h4>
        <div style="font-size:11px;color:#666;margin-bottom:6px">Subject: ${synth.subject_line || ''}</div>
        <div class="outreach-box">${synth.outreach_email}</div>
        <button class="copy-btn" onclick="copyText('${escapeHtml(synth.outreach_email)}')">Copy email</button>
      </div>` : ''}

      ${synth.reasoning ? `
      <div class="detail-section">
        <h4>🎯 Pitch Fit</h4>
        <p>${synth.reasoning}</p>
      </div>` : ''}
    </div>`;

  if (g.lat) {
    map.setView([g.lat, g.lng], 6);
  }

  if (!panelOpen) togglePanel();
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('statusDot').className = `status-dot ${state}`;
  document.getElementById('statusText').textContent = text;
}

function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('collapsed', !panelOpen);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => alert('Copied!')).catch(() => {});
}

// ─── Keyboard shortcut ────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSearch();
});

// ─── Load cached guests on startup ───────────────────────────────────────────
(async () => {
  try {
    const resp = await fetch(`${API}/api/guests`);
    const data = await resp.json();
    if (data.guests?.length) {
      allGuests = data.guests;
      renderResults(data.guests, 'cached');
      setStatus('done', `Loaded ${data.count} cached guests`);
    }
  } catch (e) {
    // API not up yet, that's fine
  }
})();
</script>
</body>
</html>
